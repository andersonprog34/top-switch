<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo de jogos para Nintendo Switch organizados por gênero.">
  <title>Switch Games — Catálogo</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Switch Games">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="brand-icon">SW</span>
        <div>
          <h1 id="site-title">Switch Games</h1>
          <p class="brand-sub">Catálogo Nintendo Switch</p>
        </div>
      </div>
      <p class="copyright-header">Criado por Anderson Fernandes</p>
      <div class="header-actions">
        <div class="search-wrap">
          <label for="search" class="visually-hidden">Buscar jogo</label>
          <input type="search" id="search" placeholder="Buscar jogo..." autocomplete="off">
          <span class="search-icon" aria-hidden="true"><svg width="1.1rem" height="1.1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M19 19l-4-4"/></svg></span>
        </div>
        <select id="filter-select" class="filter-select" title="Filtrar jogos">
          <option value="all">Todos</option>
          <option value="favorite">Favoritos</option>
          <option value="multiplayer">Multiplayer</option>
          <option value="nintendo">Exclusivo Nintendo</option>
          <option value="ptbr">PT-BR</option>
          <option value="traducao">Tradução</option>
          <option disabled>── Gêneros ──</option>
        </select>
        <button type="button" id="btn-batch-autofill" class="btn btn-ghost" title="Preencher todos os jogos via RAWG"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><circle cx="18" cy="18" r="3"/><path d="M22 20l-.5-1.5L20 18l1.5-.5L22 16l.5 1.5L24 18l-1.5.5z"/></svg> Auto Preencher Todos</button>
        <button type="button" id="btn-export" class="btn btn-ghost" title="Baixar dados editados"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Exportar</button>
        <button type="button" id="btn-import" class="btn btn-ghost" title="Carregar dados de um arquivo"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Importar</button>
        <button type="button" id="theme-toggle" class="btn btn-ghost" title="Alternar tema"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><span class="btn-label">Tema</span></button>
        <button type="button" id="global-add-btn" class="btn btn-primary"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Adicionar jogo</button>
      </div>
    </div>
  </header>

  <main class="container" id="catalog"></main>

  <button type="button" id="scroll-top" class="scroll-top" aria-label="Voltar ao topo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>

  <footer class="site-footer">
    <div class="container">
      <p class="copyright-footer">Criado por Anderson Fernandes</p>
    </div>
  </footer>

  <!-- Modal: detalhes do jogo -->
  <dialog id="detail-modal" class="modal">
    <div class="modal-content detail-modal">
      <button type="button" class="modal-close" data-close aria-label="Fechar"><svg width="1.2rem" height="1.2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="detail-layout">
        <div class="detail-cover-wrap">
          <img id="detail-cover" src="" alt="" class="detail-cover">
        </div>
        <div class="detail-info">
          <span id="detail-genre" class="detail-genre"></span>
          <h2 id="detail-title"></h2>
          <p id="detail-tags" class="detail-tags"></p>
          <p id="detail-description" class="detail-description"></p>
          <div class="detail-gallery-section">
            <h3 class="gallery-title">Imagens</h3>
            <div id="detail-gallery" class="detail-gallery"></div>
          </div>
          <div class="detail-actions">
            <button type="button" id="detail-edit" class="btn btn-primary">Editar jogo</button>
            <button type="button" id="detail-delete" class="btn btn-danger">Excluir jogo</button>
          </div>
        </div>
      </div>
    </div>
  </dialog>

  <!-- Modal: lightbox de imagens -->
  <dialog id="lightbox-modal" class="modal lightbox-modal">
    <div class="lightbox-content">
      <button type="button" class="modal-close" data-close aria-label="Fechar"><svg width="1.2rem" height="1.2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <button type="button" class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Anterior" hidden><svg width="1.5rem" height="1.5rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <img id="lightbox-image" src="" alt="">
      <button type="button" class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Próximo" hidden><svg width="1.5rem" height="1.5rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
  </dialog>

  <!-- Modal: adicionar / editar jogo -->
  <dialog id="game-modal" class="modal">
    <form id="game-form" class="modal-content game-form">
      <button type="button" class="modal-close" data-close aria-label="Fechar"><svg width="1.2rem" height="1.2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <h2 id="game-form-title">Adicionar jogo</h2>

      <div class="genre-picker">
        <label for="genre-filter">Gênero</label>
        <input type="search" id="genre-filter" placeholder="Filtrar gênero..." autocomplete="off">
        <select id="game-genre" required size="6" aria-label="Selecione o gênero"></select>
        <p id="genre-filter-empty" class="genre-filter-empty" hidden>Nenhum gênero encontrado.</p>
        <div class="genre-add-wrap">
          <button type="button" id="btn-add-genre" class="btn btn-ghost btn-sm">＋ Novo gênero</button>
          <div id="genre-add-inline" class="genre-add-inline" hidden>
            <input type="text" id="genre-new-name" placeholder="Digite o nome do gênero...">
            <button type="button" id="btn-confirm-genre" class="btn btn-primary btn-sm">Adicionar</button>
            <button type="button" id="btn-cancel-genre" class="btn btn-ghost btn-sm">Cancelar</button>
          </div>
        </div>
      </div>

      <label for="game-title">Nome do jogo</label>
      <div class="title-with-autofill">
        <input type="text" id="game-title" required placeholder="Ex: Zelda Breath of the Wild">
        <button type="button" id="btn-autofill" class="btn btn-autofill" title="Buscar dados na RAWG API"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Auto Preencher</button>
      </div>

      <label for="game-tags">Tags / subgênero</label>
      <input type="text" id="game-tags" placeholder="Ex: Mundo aberto, Multiplay">

      <label class="checkbox-label">
        <input type="checkbox" id="game-multiplayer">
        <span>Possui multiplayer / coop</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="game-nintendo">
        <span>Exclusivo Nintendo</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="game-ptbr">
        <span>PT-BR</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="game-traducao">
        <span>Tradução</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="game-favorite">
        <span>Favoritar jogo</span>
      </label>

      <label for="game-description">Descrição</label>
      <textarea id="game-description" rows="8" placeholder="Descrição sobre o jogo"></textarea>

      <label for="game-cover">URL da capa</label>
      <input type="url" id="game-cover" placeholder="https://... (opcional)">

      <label for="game-images">URLs de fotos adicionais (uma por linha)</label>
      <textarea id="game-images" rows="4" placeholder="https://...&#10;https://..."></textarea>

      <input type="hidden" id="game-id">

      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-close>Cancelar</button>
        <button type="submit" id="game-form-submit" class="btn btn-primary">Salvar jogo</button>
      </div>
    </form>
  </dialog>

  <script src="data/games-data.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
